ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.qrscanner.ApplicationKt.module ]
    }
}

app {
    maxImageSize = 10485760  # 10MB
    maxBatchSize = 10
    supportedFormats = ["image/png", "image/jpeg", "image/gif", "image/bmp", "image/webp", "image/tiff"]

    stream {
        maxFrameSize = 2097152
        sessionTimeoutSeconds = 300
        idleTimeoutSeconds = 60
        defaultEscalationThreshold = 10
    }
}
